<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }} - Personal Calendar Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto max-w-6xl px-6 py-5">
            <h1 class="text-2xl font-bold">Personal Calendar Assistant</h1>

            <nav class="mt-4 space-y-4">
                <a href="/" class="block text-lg font-semibold text-blue-600 hover:text-blue-800">
                    Dashboard
                </a>

                <a href="/tasks" class="block text-lg font-semibold text-blue-600 hover:text-blue-800">
                    Tasks
                </a>
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>

{% extends "base.html" %}

{% block content %}
<section>
    <div class="mb-8">
        <h2 class="mt-2 text-4xl font-bold tracking-tight">Today</h2>
        <p class="mt-3 text-lg text-slate-600">
            Your calendar assistant is running.
        </p>
    </div>

    <div class="grid gap-6 md:grid-cols-3">
        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
                <h3 class="text-lg font-semibold">Events</h3>
                <span class="rounded-full bg-blue-100 px-3 py-1 text-sm font-medium text-blue-700">
                    0
                </span>
            </div>

            <p class="text-sm text-slate-500">No events yet.</p>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
                <h3 class="text-lg font-semibold">Tasks</h3>
                <span class="rounded-full bg-emerald-100 px-3 py-1 text-sm font-medium text-emerald-700">
                    0
                </span>
            </div>

            <p class="text-sm text-slate-500">No tasks yet.</p>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
                <h3 class="text-lg font-semibold">Suggestions</h3>
                <span class="rounded-full bg-amber-100 px-3 py-1 text-sm font-medium text-amber-700">
                    0
                </span>
            </div>

            <p class="text-sm text-slate-500">No suggestions yet.</p>
        </section>
    </div>
</section>
{% endblock %}
